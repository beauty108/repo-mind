version: "3.9"

# Minimal compose scoped to backend services only.
# A full-stack compose (including frontend) is handled separately.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: repomind
      POSTGRES_PASSWORD: repomind
      POSTGRES_DB: repomind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repomind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://repomind:repomind@postgres:5432/repomind
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://repomind:repomind@postgres:5432/repomind
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/backend/app
      - /tmp/repomind:/tmp/repomind
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://repomind:repomind@postgres:5432/repomind
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/backend/app
      - /tmp/repomind:/tmp/repomind
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
